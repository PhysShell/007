[package]
name = "o7"
version = "0.1.0"
edition = "2021"
description = "007 — private harness: one isolated, gated agent run over a target repo"

[[bin]]
name = "o7"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
anyhow = "1"
sha1 = "0.10"
sha2 = "0.10"

# `kani` is a cfg set by `cargo kani`; register it so stable builds don't warn.
[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(kani)'] }

[dev-dependencies]
proptest = "1"

[profile.release]
strip = true
