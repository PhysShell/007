name: o7-worker gate

# Independent HOSTED replay of the o7-worker re-gate matrix (fmt, clippy, workspace
# check, o7-worker tests, cargo-deny). This is an infrastructure replay, NOT an
# independent code review: it runs tests authored in this repository. Action pins are
# full-length commit SHAs (immutable); tags in comments are informational.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  worker-gate:
    name: worker gate
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout exact tested revision
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false
          # On a PR, test the PR HEAD (not the synthetic merge ref); on push/manual, the pushed SHA.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Record execution identity
        shell: bash
        run: |
          set -euo pipefail
          echo "tested_sha=$(git rev-parse HEAD)"
          echo "event=${GITHUB_EVENT_NAME}"
          # The repository's toolchain is the floating `stable` channel (rust-toolchain.toml),
          # NOT a pinned version — the exact resolved identity is recorded here.
          rustup show active-toolchain
          rustc -Vv
          cargo --version
          git status --short

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Workspace check
        run: cargo check --workspace --all-targets --locked

      - name: o7-worker tests
        run: cargo test -p o7-worker --locked --no-fail-fast

  dependency-policy:
    name: dependency policy
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout exact tested revision
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Bans, licenses, sources
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          command: check bans licenses sources
          # Empty, so the action's default `--all-features` does not silently widen the
          # dependency graph relative to the accepted local `cargo deny check`.
          arguments: ""

  advisories:
    name: dependency advisories
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout exact tested revision
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Advisories
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          command: check advisories
          arguments: ""
